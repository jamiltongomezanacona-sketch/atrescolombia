<!doctype html>
<html lang="es-CO">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>ATRES sin conexion</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f4f3f1;
        color: #111111;
      }

      main {
        width: min(100% - 40px, 420px);
        text-align: center;
      }

      img {
        width: 72px;
        height: 72px;
        object-fit: contain;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.6rem, 5vw, 2.35rem);
        line-height: 1.05;
        letter-spacing: 0;
      }

      p {
        margin: 14px 0 0;
        color: #555555;
        line-height: 1.55;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        margin-top: 28px;
        padding: 0 18px;
        border-radius: 999px;
        background: #111111;
        color: #ffffff;
        font-size: 0.9rem;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon-192.png" alt="" />
      <h1>ATRES esta sin conexion</h1>
      <p>Revisa tu conexion e intenta de nuevo. Algunas paginas visitadas pueden abrirse desde la memoria del dispositivo.</p>
      <a href="/">Volver al inicio</a>
    </main>
  </body>
</html>
